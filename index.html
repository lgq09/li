<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇对战版 | 双人同屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            color: #fff;
            padding: 20px;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 36px;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            width: 600px;
        }
        .player-score {
            font-size: 24px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid transparent;
        }
        .player1-score {
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
        }
        .player2-score {
            border-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }
        #gameCanvas {
            border: 4px solid rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
        .controls-guide {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            width: 600px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.15);
            padding: 15px;
            border-radius: 12px;
        }
        .player-controls {
            padding: 10px;
        }
        .player1-controls {
            color: #4facfe;
        }
        .player2-controls {
            color: #ff6b6b;
        }
        .controls-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 18px;
        }
        .prop-explain {
            text-align: center;
            margin-top: 15px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
        }
        .rule-explain {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.1);
            padding: 8px 15px;
            border-radius: 6px;
        }
        .start-btn {
            display: block;
            margin: 20px auto 0;
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(79, 172, 254, 0.4);
            transition: all 0.3s ease;
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.6);
        }
        .mobile-controls {
            display: none;
            margin-top: 25px;
            width: 500px;
            gap: 20px;
        }
        .mobile-player-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 240px;
        }
        .mobile-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .p1-btn {
            background: rgba(79, 172, 254, 0.3);
        }
        .p1-btn:hover {
            background: rgba(79, 172, 254, 0.5);
        }
        .p2-btn {
            background: rgba(255, 107, 107, 0.3);
        }
        .p2-btn:hover {
            background: rgba(255, 107, 107, 0.5);
        }

        /* 响应式适配手机 */
        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }
            h1 {
                font-size: 28px;
            }
            .score-board, .controls-guide {
                width: 300px;
                flex-direction: column;
                gap: 10px;
            }
            #gameCanvas {
                width: 300px;
                height: 300px;
            }
            .mobile-controls {
                display: flex;
                width: 300px;
                flex-direction: column;
            }
            .controls-guide {
                font-size: 14px;
            }
            .start-btn {
                font-size: 18px;
                padding: 10px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 贪吃蛇对战版</h1>
        
        <!-- 分数面板 -->
        <div class="score-board">
            <div class="player-score player1-score">玩家1 (蓝蛇): 0</div>
            <div class="player-score player2-score">玩家2 (红蛇): 0</div>
        </div>
        
        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        
        <!-- 开始游戏按钮 -->
        <button class="start-btn" id="startGameBtn">开始游戏 🎮</button>
        
        <!-- 操作指南 -->
        <div class="controls-guide">
            <div class="player-controls player1-controls">
                <div class="controls-title">玩家1 (蓝蛇)</div>
                <div>↑↓←→ 方向键控制</div>
            </div>
            <div class="player-controls player2-controls">
                <div class="controls-title">玩家2 (红蛇)</div>
                <div>W S A D 键控制</div>
            </div>
        </div>
        
        <!-- 道具说明 -->
        <div class="prop-explain">
            📌 道具效果：⚡加速 🐢减速 📏变小 🥶定身
        </div>
        
        <!-- 游戏规则说明 -->
        <div class="rule-explain">
            📋 游戏规则：先撞墙/死亡方输 | 头碰头双方都输 | 吃食物蛇身多一格
        </div>
        
        <!-- 手机虚拟按键 -->
        <div class="mobile-controls">
            <div class="mobile-player-controls">
                <button class="mobile-btn p1-btn"></button>
                <button class="mobile-btn p1-btn" id="p1Up">↑</button>
                <button class="mobile-btn p1-btn"></button>
                <button class="mobile-btn p1-btn" id="p1Left">←</button>
                <button class="mobile-btn p1-btn"></button>
                <button class="mobile-btn p1-btn" id="p1Right">→</button>
                <button class="mobile-btn p1-btn"></button>
                <button class="mobile-btn p1-btn" id="p1Down">↓</button>
                <button class="mobile-btn p1-btn"></button>
            </div>
            <div class="mobile-player-controls">
                <button class="mobile-btn p2-btn"></button>
                <button class="mobile-btn p2-btn" id="p2Up">W</button>
                <button class="mobile-btn p2-btn"></button>
                <button class="mobile-btn p2-btn" id="p2Left">A</button>
                <button class="mobile-btn p2-btn"></button>
                <button class="mobile-btn p2-btn" id="p2Right">D</button>
                <button class="mobile-btn p2-btn"></button>
                <button class="mobile-btn p2-btn" id="p2Down">S</button>
                <button class="mobile-btn p2-btn"></button>
            </div>
        </div>
    </div>

    <script>
        // 核心元素获取
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const p1ScoreElement = document.querySelector('.player1-score');
        const p2ScoreElement = document.querySelector('.player2-score');
        const startGameBtn = document.getElementById('startGameBtn');
        
        // 游戏核心配置
        const gridSize = 20;
        const tileWidth = Math.floor(canvas.width / gridSize);
        const tileHeight = Math.floor(canvas.height / gridSize);
        
        // 玩家1（蓝蛇）配置
        let snake1 = [{x: 8, y: tileHeight/2}];
        let dx1 = 1, dy1 = 0;
        let score1 = 0;
        let speed1 = 120; // 基础速度
        let size1 = 1; // 大小倍率
        let freeze1 = false; // 是否被定身
        
        // 玩家2（红蛇）配置
        let snake2 = [{x: tileWidth - 8, y: tileHeight/2}];
        let dx2 = -1, dy2 = 0;
        let score2 = 0;
        let speed2 = 120;
        let size2 = 1;
        let freeze2 = false;
        
        // 食物和道具配置
        let food = {x: 0, y: 0};
        let props = []; // 道具数组
        const propTypes = ['speed', 'slow', 'small', 'freeze']; // 加速、减速、变小、定身
        let gameLoop = null;
        let isGameRunning = false;
        
        // 初始化画布（显示初始界面）
        function initCanvas() {
            // 清空画布
            ctx.fillStyle = '#f9f9f9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制初始提示
            ctx.fillStyle = '#333';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('点击「开始游戏」按钮开始对战', canvas.width/2, canvas.height/2 - 20);
            ctx.font = '18px Arial';
            ctx.fillText('玩家1：方向键 | 玩家2：WASD', canvas.width/2, canvas.height/2 + 20);
            
            // 绘制网格
            ctx.strokeStyle = '#eeeeee';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileWidth; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= tileHeight; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }
        
        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            resetGame();
            
            // 生成食物和道具
            generateFood();
            generateProps();
            updateScores();
            
            // 开始游戏循环
            isGameRunning = true;
            gameLoop = setInterval(update, Math.min(speed1, speed2));
            
            // 隐藏开始按钮
            startGameBtn.style.display = 'none';
        }
        
        // 生成食物
        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileWidth),
                    y: Math.floor(Math.random() * tileHeight)
                };
            } while (
                // 确保食物不在蛇身上、道具上
                snake1.some(seg => seg.x === newFood.x && seg.y === newFood.y) ||
                snake2.some(seg => seg.x === newFood.x && seg.y === newFood.y) ||
                props.some(prop => prop.x === newFood.x && prop.y === newFood.y)
            );
            food = newFood;
        }
        
        // 生成道具（随机位置、随机类型）
        function generateProps() {
            props = [];
            const propCount = 2; // 同时存在2个道具
            for (let i = 0; i < propCount; i++) {
                let newProp;
                do {
                    newProp = {
                        x: Math.floor(Math.random() * tileWidth),
                        y: Math.floor(Math.random() * tileHeight),
                        type: propTypes[Math.floor(Math.random() * propTypes.length)],
                        time: 5000 // 道具持续时间5秒
                    };
                } while (
                    snake1.some(seg => seg.x === newProp.x && seg.y === newProp.y) ||
                    snake2.some(seg => seg.x === newProp.x && seg.y === newProp.y) ||
                    (food.x === newProp.x && food.y === newProp.y) ||
                    props.some(p => p.x === newProp.x && p.y === newProp.y)
                );
                props.push(newProp);
            }
        }
        
        // 应用道具效果
        function applyProp(player, type) {
            if (player === 1) {
                switch(type) {
                    case 'speed': // 加速
                        speed1 = 80;
                        setTimeout(() => speed1 = 120, 5000);
                        break;
                    case 'slow': // 减速
                        speed1 = 160;
                        setTimeout(() => speed1 = 120, 5000);
                        break;
                    case 'small': // 变小
                        size1 = 0.7;
                        setTimeout(() => size1 = 1, 5000);
                        break;
                    case 'freeze': // 定身对方
                        freeze2 = true;
                        setTimeout(() => freeze2 = false, 3000);
                        break;
                }
            } else {
                switch(type) {
                    case 'speed':
                        speed2 = 80;
                        setTimeout(() => speed2 = 120, 5000);
                        break;
                    case 'slow':
                        speed2 = 160;
                        setTimeout(() => speed2 = 120, 5000);
                        break;
                    case 'small':
                        size2 = 0.7;
                        setTimeout(() => size2 = 1, 5000);
                        break;
                    case 'freeze':
                        freeze1 = true;
                        setTimeout(() => freeze1 = false, 3000);
                        break;
                }
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return; // 游戏未开始时不响应按键
            
            // 玩家1：方向键
            switch(e.key) {
                case 'ArrowUp': if (dy1 !== 1 && !freeze1) { dx1 = 0; dy1 = -1; } break;
                case 'ArrowDown': if (dy1 !== -1 && !freeze1) { dx1 = 0; dy1 = 1; } break;
                case 'ArrowLeft': if (dx1 !== 1 && !freeze1) { dx1 = -1; dy1 = 0; } break;
                case 'ArrowRight': if (dx1 !== -1 && !freeze1) { dx1 = 1; dy1 = 0; } break;
                
                // 玩家2：WASD
                case 'w': case 'W': if (dy2 !== 1 && !freeze2) { dx2 = 0; dy2 = -1; } break;
                case 's': case 'S': if (dy2 !== -1 && !freeze2) { dx2 = 0; dy2 = 1; } break;
                case 'a': case 'A': if (dx2 !== 1 && !freeze2) { dx2 = -1; dy2 = 0; } break;
                case 'd': case 'D': if (dx2 !== -1 && !freeze2) { dx2 = 1; dy2 = 0; } break;
            }
        });
        
        // 手机虚拟按键控制
        // 玩家1
        document.getElementById('p1Up').addEventListener('click', () => { 
            if (isGameRunning && dy1 !== 1 && !freeze1) { dx1 = 0; dy1 = -1; } 
        });
        document.getElementById('p1Down').addEventListener('click', () => { 
            if (isGameRunning && dy1 !== -1 && !freeze1) { dx1 = 0; dy1 = 1; } 
        });
        document.getElementById('p1Left').addEventListener('click', () => { 
            if (isGameRunning && dx1 !== 1 && !freeze1) { dx1 = -1; dy1 = 0; } 
        });
        document.getElementById('p1Right').addEventListener('click', () => { 
            if (isGameRunning && dx1 !== -1 && !freeze1) { dx1 = 1; dy1 = 0; } 
        });
        
        // 玩家2
        document.getElementById('p2Up').addEventListener('click', () => { 
            if (isGameRunning && dy2 !== 1 && !freeze2) { dx2 = 0; dy2 = -1; } 
        });
        document.getElementById('p2Down').addEventListener('click', () => { 
            if (isGameRunning && dy2 !== -1 && !freeze2) { dx2 = 0; dy2 = 1; } 
        });
        document.getElementById('p2Left').addEventListener('click', () => { 
            if (isGameRunning && dx2 !== 1 && !freeze2) { dx2 = -1; dy2 = 0; } 
        });
        document.getElementById('p2Right').addEventListener('click', () => { 
            if (isGameRunning && dx2 !== -1 && !freeze2) { dx2 = 1; dy2 = 0; } 
        });
        
        // 更新分数
        function updateScores() {
            p1ScoreElement.textContent = `玩家1 (蓝蛇): ${score1}`;
            p2ScoreElement.textContent = `玩家2 (红蛇): ${score2}`;
        }
        
        // 碰撞检测
        function checkCollision(snake, head) {
            // 撞墙
            if (head.x < 0 || head.x >= tileWidth || head.y < 0 || head.y >= tileHeight) return true;
            // 撞自己
            if (snake.slice(1).some(seg => seg.x === head.x && seg.y === head.y)) return true;
            // 撞对方身体（非头部）
            if (snake === snake1) {
                return snake2.slice(1).some(seg => seg.x === head.x && seg.y === head.y);
            } else {
                return snake1.slice(1).some(seg => seg.x === head.x && seg.y === head.y);
            }
        }
        
        // 检查头碰头
        function checkHeadToHead(head1, head2) {
            return head1.x === head2.x && head1.y === head2.y;
        }
        
        // 游戏主循环
        function update() {
            let head1 = {x: snake1[0].x, y: snake1[0].y};
            let head2 = {x: snake2[0].x, y: snake2[0].y};
            let p1Dead = false;
            let p2Dead = false;
            
            // 移动玩家1
            if (!freeze1) {
                head1 = {x: snake1[0].x + dx1, y: snake1[0].y + dy1};
                snake1.unshift(head1);
                
                // 玩家1吃到食物（多一格）
                if (head1.x === food.x && head1.y === food.y) {
                    score1++;
                    updateScores();
                    generateFood();
                    // 吃食物不pop，直接多一格
                } else {
                    snake1.pop();
                }
                
                // 玩家1吃到道具
                props.forEach((prop, index) => {
                    if (head1.x === prop.x && head1.y === prop.y) {
                        applyProp(1, prop.type);
                        props.splice(index, 1);
                        // 补充新道具
                        setTimeout(generateProps, 1000);
                    }
                });
                
                // 玩家1碰撞检测（撞墙/自己/对方身体）
                if (checkCollision(snake1, head1)) {
                    p1Dead = true;
                }
            }
            
            // 移动玩家2
            if (!freeze2) {
                head2 = {x: snake2[0].x + dx2, y: snake2[0].y + dy2};
                snake2.unshift(head2);
                
                // 玩家2吃到食物（多一格）
                if (head2.x === food.x && head2.y === food.y) {
                    score2++;
                    updateScores();
                    generateFood();
                    // 吃食物不pop，直接多一格
                } else {
                    snake2.pop();
                }
                
                // 玩家2吃到道具
                props.forEach((prop, index) => {
                    if (head2.x === prop.x && head2.y === prop.y) {
                        applyProp(2, prop.type);
                        props.splice(index, 1);
                        // 补充新道具
                        setTimeout(generateProps, 1000);
                    }
                });
                
                // 玩家2碰撞检测（撞墙/自己/对方身体）
                if (checkCollision(snake2, head2)) {
                    p2Dead = true;
                }
            }
            
            // 检查头碰头
            const isHeadToHead = checkHeadToHead(head1, head2);
            
            // 判定胜负
            if (isHeadToHead) {
                // 头碰头双方都输
                endGame(0);
                return;
            } else if (p1Dead) {
                // 玩家1先死，玩家2胜利
                endGame(2);
                return;
            } else if (p2Dead) {
                // 玩家2先死，玩家1胜利
                endGame(1);
                return;
            }
            
            // 绘制游戏
            draw();
            
            // 更新游戏速度
            if (isGameRunning) {
                clearInterval(gameLoop);
                gameLoop = setInterval(update, Math.min(speed1, speed2));
            }
        }
        
        // 结束游戏
        function endGame(result) {
            // 停止游戏循环
            clearInterval(gameLoop);
            isGameRunning = false;
            
            // 显示胜负提示
            let gameOverText = '';
            if (result === 0) {
                // 头碰头双方都输
                gameOverText = `💥 头碰头！双方都输掉游戏！\n玩家1得分: ${score1}\n玩家2得分: ${score2}`;
            } else if (result === 1) {
                // 玩家1胜利，玩家2输掉
                gameOverText = `🏆 玩家1（蓝蛇）胜利！\n❌ 玩家2（红蛇）输掉游戏！\n玩家1得分: ${score1}\n玩家2得分: ${score2}`;
            } else {
                // 玩家2胜利，玩家1输掉
                gameOverText = `🏆 玩家2（红蛇）胜利！\n❌ 玩家1（蓝蛇）输掉游戏！\n玩家1得分: ${score1}\n玩家2得分: ${score2}`;
            }
            alert(gameOverText);
            
            // 显示开始游戏按钮，等待用户手动开始
            startGameBtn.style.display = 'block';
            startGameBtn.textContent = '重新开始 🎮';
            
            // 重置画布显示初始界面
            initCanvas();
        }
        
        // 重置游戏
        function resetGame() {
            // 重置玩家1
            snake1 = [{x: 8, y: tileHeight/2}];
            dx1 = 1; dy1 = 0;
            score1 = 0;
            speed1 = 120;
            size1 = 1;
            freeze1 = false;
            
            // 重置玩家2
            snake2 = [{x: tileWidth - 8, y: tileHeight/2}];
            dx2 = -1; dy2 = 0;
            score2 = 0;
            speed2 = 120;
            size2 = 1;
            freeze2 = false;
            
            // 重置食物和道具
            food = {x: 0, y: 0};
            props = [];
            
            // 重置分数显示
            updateScores();
        }
        
        // 绘制游戏界面
        function draw() {
            if (!isGameRunning) return;
            
            // 清空画布
            ctx.fillStyle = '#f9f9f9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = '#eeeeee';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileWidth; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= tileHeight; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 绘制道具
            props.forEach(prop => {
                let color, icon;
                switch(prop.type) {
                    case 'speed': color = '#ffd700'; icon = '⚡'; break;
                    case 'slow': color = '#90ee90'; icon = '🐢'; break;
                    case 'small': color = '#ff69b4'; icon = '📏'; break;
                    case 'freeze': color = '#00bfff'; icon = '🥶'; break;
                }
                
                // 道具背景（圆形）
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(
                    prop.x * gridSize + gridSize/2,
                    prop.y * gridSize + gridSize/2,
                    gridSize/2 - 3,
                    0, Math.PI * 2
                );
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.stroke();
                
                // 道具图标
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(icon, prop.x * gridSize + gridSize/2, prop.y * gridSize + gridSize/2);
            });
            
            // 绘制食物（金色圆形）
            ctx.fillStyle = '#ff9800';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.strokeStyle = '#e65100';
            ctx.stroke();
            
            // 绘制玩家1（蓝蛇，椭圆形）
            snake1.forEach((seg, index) => {
                const hue = 210; // 蓝色系
                ctx.fillStyle = `hsl(${hue}, 100%, ${50 + index * 1.5}%)`;
                
                // 椭圆形蛇段
                ctx.beginPath();
                const centerX = seg.x * gridSize + gridSize/2;
                const centerY = seg.y * gridSize + gridSize/2;
                const rx = (gridSize/2 - 2) * size1;
                const ry = (gridSize/2 - 4) * size1;
                ctx.ellipse(centerX, centerY, rx, ry, 0, 0, 2 * Math.PI);
                ctx.fill();
                
                // 边框
                ctx.strokeStyle = `hsl(${hue}, 100%, 40%)`;
                ctx.stroke();
                
                // 蛇头标记
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    // 绘制眼睛
                    const eyeOffsetX = dx1 !== 0 ? (dx1 * 4) : 0;
                    const eyeOffsetY = dy1 !== 0 ? (dy1 * 4) : 0;
                    ctx.arc(centerX + eyeOffsetX, centerY + eyeOffsetY, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // 绘制玩家2（红蛇，椭圆形）
            snake2.forEach((seg, index) => {
                const hue = 0; // 红色系
                ctx.fillStyle = `hsl(${hue}, 100%, ${50 + index * 1.5}%)`;
                
                // 椭圆形蛇段
                ctx.beginPath();
                const centerX = seg.x * gridSize + gridSize/2;
                const centerY = seg.y * gridSize + gridSize/2;
                const rx = (gridSize/2 - 2) * size2;
                const ry = (gridSize/2 - 4) * size2;
                ctx.ellipse(centerX, centerY, rx, ry, 0, 0, 2 * Math.PI);
                ctx.fill();
                
                // 边框
                ctx.strokeStyle = `hsl(${hue}, 100%, 40%)`;
                ctx.stroke();
                
                // 蛇头标记
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    // 绘制眼睛
                    const eyeOffsetX = dx2 !== 0 ? (dx2 * 4) : 0;
                    const eyeOffsetY = dy2 !== 0 ? (dy2 * 4) : 0;
                    ctx.arc(centerX + eyeOffsetX, centerY + eyeOffsetY, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // 绘制定身效果（半透明遮罩）
            if (freeze1) {
                ctx.fillStyle = 'rgba(79, 172, 254, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#4facfe';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('玩家1被定身！', canvas.width/2, canvas.height/2);
            }
            if (freeze2) {
                ctx.fillStyle = 'rgba(255, 107, 107, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff6b6b';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('玩家2被定身！', canvas.width/2, canvas.height/2);
            }
        }
        
        // 绑定开始游戏按钮事件
        startGameBtn.addEventListener('click', initGame);
        
        // 初始化画布显示初始界面
        initCanvas();
    </script>
</body>
</html>
